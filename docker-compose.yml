services:
  # docker compose up -d
  mysql:
    image: mysql:8.4.8
    ports:
      - "3306:3306"
      - "33060:33060"
    environment:
      - MYSQL_ROOT_PASSWORD=admin
    volumes:
      - /Users/mizoguchi/Documents/docker_container_data/mysql_data:/var/lib/mysql

  redis:
    image: redis:latest
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=misaki
      - MINIO_ROOT_PASSWORD=nakahara
    volumes:
      - /Users/mizoguchi/Documents/docker_container_data/minio_data:/data

  # 后端应用
  misaki-api:
    image: misaki-api:latest
    ports:
      - "8080:8080"
    environment:
      - MYSQL_HOST=mysql
      - REDIS_HOST=redis
      - MINIO_HOST=minio
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      mysql:
        condition: service_started
      redis:
        condition: service_started

  # Nginx
  nginx:
    image: nginx:stable-alpine
    ports:
      - "80:80"
    volumes:
      - /Users/mizoguchi/Documents/docker_container_data/nginx_data/default.conf:/etc/nginx/conf.d/default.conf
      - /Users/mizoguchi/Documents/docker_container_data/nginx_data/dist:/usr/share/nginx/html
    depends_on:
      - misaki-api